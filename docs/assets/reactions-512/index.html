<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reef GIF 動畫</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1828;
      color: #eef6ff;
    }
    body {
      max-width: 1440px;
      margin: 0 auto;
      padding: 32px;
    }
    h1 {
      margin: 0 0 8px;
    }
    p {
      margin: 0 0 28px;
      color: #b9cbe1;
    }
    main {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 22px;
    }
    figure {
      margin: 0;
      padding: 12px;
      overflow: hidden;
      border: 1px solid #2a3b55;
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 12px 32px rgb(0 0 0 / 25%);
    }
    img {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 1;
      object-fit: contain;
    }
    figcaption {
      margin: 10px -12px -12px;
      padding: 11px 14px;
      background: #16243a;
      color: #eef6ff;
      font-weight: 700;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Reef GIF 動畫</h1>
  <p>以下十張圖片均為 512×512、無限循環播放的 GIF 動畫。</p>
  <main>
    <figure><img src="01-licking.gif" alt="舔舔舔 GIF 動畫"><figcaption>1. 舔舔舔</figcaption></figure>
    <figure><img src="02-glow-sticks.gif" alt="揮螢光棒 GIF 動畫"><figcaption>2. 揮螢光棒</figcaption></figure>
    <figure><img src="03-startled-shake.gif" alt="驚嚇到上下震動 GIF 動畫"><figcaption>3. 驚嚇到上下震動</figcaption></figure>
    <figure><img src="04-blush-cover.gif" alt="臉紅遮臉不行不行 GIF 動畫"><figcaption>4. 臉紅遮臉・不行不行</figcaption></figure>
    <figure><img src="05-smoke-puff.gif" alt="吐一口菸 GIF 動畫"><figcaption>5. 吐一口菸</figcaption></figure>
    <figure><img src="06-rainbow.gif" alt="吐彩虹 GIF 動畫"><figcaption>6. 吐彩虹</figcaption></figure>
    <figure><img src="07-tail-wag.gif" alt="開心搖尾巴 GIF 動畫"><figcaption>7. 開心搖尾巴</figcaption></figure>
    <figure><img src="08-ugly-cry.gif" alt="醜哭 GIF 動畫"><figcaption>8. 醜哭</figcaption></figure>
    <figure><img src="09-flirty-drool.gif" alt="色色吐舌頭和流口水 GIF 動畫"><figcaption>9. 色色吐舌頭＋流口水</figcaption></figure>
    <figure><img src="10-terror-scream.gif" alt="驚恐叫 GIF 動畫"><figcaption>10. 阿~~~~（驚恐叫）</figcaption></figure>
  </main>
</body>
</html>
